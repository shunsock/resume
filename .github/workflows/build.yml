name: Build Test

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'docs/**'
      - 'bun.lock'
      - 'package.json'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build Site
        run: bash script/build.sh
