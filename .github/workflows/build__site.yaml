name: build__site

# build-test を branch protection の required status check にするため
# paths フィルタを設けず全 PR で実行する (path 限定だと check が報告されず merge が塞がる)。
on:
  pull_request:
    branches: ["main"]

# 既定では何も書き込ませない (最小権限)。checkout に必要な read のみ job 側で付与する。
permissions: {}

jobs:
  build-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # build 検証では認証情報を残す必要がない (最小権限)。
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0

      - name: Build Site
        run: bash script/build.sh
