name: Build Test

# build-test を branch protection の required status check にするため
# paths フィルタを設けず全 PR で実行する (path 限定だと check が報告されず merge が塞がる)。
on:
  pull_request:
    branches: ["main"]

# 既定では何も書き込ませない (最小権限)。checkout に必要な read のみ job 側で付与する。
permissions: {}

jobs:
  build-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # build 検証では認証情報を残す必要がない (最小権限)。
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Build Site
        run: bash script/build.sh
